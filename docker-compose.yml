version: '3.8'

services:
  backend:
    build:
      context: ./backend
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    deploy:
      replicas: 3

  worker:
    build:
      context: ./backend
    command: arq worker.WorkerSettings
    environment:
      - MONGO_URI=mongodb://mongodb:27017/ecommerce
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
      - mongodb

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
